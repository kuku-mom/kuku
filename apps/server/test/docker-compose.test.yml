services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: kuku
      POSTGRES_USER: kuku
      POSTGRES_PASSWORD: kuku
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5555:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kuku -d kuku"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  rustfs:
    image: rustfs/rustfs:latest
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_CONSOLE_ENABLE: "true"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rustfs-data:/data
    command: ["--address", ":9000", "--console-enable", "/data"]

volumes:
  postgres-data:
  rustfs-data:
