services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: kuku
      POSTGRES_USER: kuku
      POSTGRES_PASSWORD: kuku
    ports:
      - "5555:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kuku -d kuku"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres-data:
