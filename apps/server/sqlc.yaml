version: "2"
sql:
  - engine: "postgresql"
    queries: "sql/queries"
    schema: "sql/migrations"
    gen:
      go:
        package: "sqlc"
        out: "internal/database/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        overrides:
          # Map UUID columns to `google/uuid` so the application layer doesn't
          # have to translate every parameter through pgtype helpers.
          # Two entries are required — sqlc treats nullable / non-nullable
          # as separate `db_type` overrides (see sqlc overrides docs).
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "NullUUID"
