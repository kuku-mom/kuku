$schema: "https://moonrepo.dev/schemas/project.json"

language: "go"
layer: "application"

# The Go server imports the generated proto client from
# packages/contract (wired via a go.mod `replace` directive). Moon
# auto-detects this through the pnpm workspace:* entry in package.json,
# but listing it here keeps the dependency graph readable from this
# file alone.
dependsOn:
  - "contract"

# Go tools are pinned in tools/*.mod so runtime dependencies stay separate
# from development tools while moon's per-project cache still picks up tool
# version bumps automatically. Cache dirs live at the workspace root so
# sibling projects that also run `go build` (packages/contract) can reuse
# warmed object files.
env:
  GOLANGCI_LINT_CACHE: "$workspaceRoot/.cache/golangci-lint"
  GOCACHE: "$workspaceRoot/.cache/go-build"

tasks:
  format:
    script: "go tool -modfile=tools/golangci-lint.mod golangci-lint fmt --config .golangci.yaml"

  format-check:
    script: "go tool -modfile=tools/golangci-lint.mod golangci-lint fmt --config .golangci.yaml --diff"
    inputs:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yaml"
      - "tools/golangci-lint.mod"
      - "tools/golangci-lint.sum"

  # lint:fix equivalent — keeps the destructive `--fix` as a separate task
  # so `check` can't accidentally mutate files.
  lint:
    script: "go tool -modfile=tools/golangci-lint.mod golangci-lint run --config .golangci.yaml --fix"

  lint-check:
    script: "go tool -modfile=tools/golangci-lint.mod golangci-lint run --config .golangci.yaml"
    inputs:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yaml"
      - "tools/golangci-lint.mod"
      - "tools/golangci-lint.sum"

  test:
    command: "go test ./..."
    inputs:
      - "**/*.go"
      - "go.mod"
      - "go.sum"

  build:
    command: "go build ./..."
    inputs:
      - "**/*.go"
      - "go.mod"
      - "go.sum"

  # `go run ./cmd/server migrate` applies pending SQL migrations against
  # the configured DATABASE_URL. Never cached (side-effecting) and not
  # run in CI — migrations are applied once per environment, not per
  # build.
  db-migrate:
    command: "go run ./cmd/server migrate"
    options:
      cache: false
      runInCI: false

  # Air watches Go sources and restarts the binary on changes. The preset
  # 'server' shape implies persistent + no cache + local-only, which is
  # what we want for a dev watcher. ENV_PATH points at the committed dev
  # secrets so `pnpm dev` / `moon run server:dev` "just works".
  dev:
    script: "go tool -modfile=tools/air.mod air -c .air.toml"
    env:
      ENV_PATH: ".env.dev"
    preset: "server"

  # Compiles the production server binary. Separate from :build (which
  # runs `go build ./...` for type-check) so only one call site has to
  # know the output path — everything else (dev, db-migrate, tests) goes
  # through `go run` / `go test` and doesn't need the binary.
  build-bin:
    command: "go build -o bin/server ./cmd/server"
    inputs:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
    outputs:
      - "bin/server"

  clean:
    command: "rm -rf bin"
    options:
      cache: false
      runInCI: false

  # Regenerates sqlc models from sql/queries/**/*.sql. Must run whenever
  # the SQL changes; moon's input hash detects that automatically. The
  # generated .go files land in internal/database/sqlc/ and are committed
  # (sqlc is not in the build graph — keep generated code visible in diffs).
  sqlc-generate:
    script: "go tool -modfile=tools/sqlc.mod sqlc generate"
    inputs:
      - "sql/queries/**/*.sql"
      - "sql/migrations/**/*.sql"
      - "sqlc.yaml"
      - "tools/sqlc.mod"
      - "tools/sqlc.sum"
    outputs:
      - "internal/database/sqlc/**/*.go"

  check:
    deps:
      - "format-check"
      - "lint-check"
