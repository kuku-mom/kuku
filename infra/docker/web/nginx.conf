server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # nginx generates absolute redirects by default (e.g. `/foo` → `/foo/`
  # becomes `Location: http://host/foo/`) and uses its own listening
  # port — which is 80 inside the container, stripped from the URL when
  # the docker-compose host mapping is `:8081:80`. The result is
  # browsers bouncing from `localhost:8081/auth/signin` to
  # `localhost/auth/signin/`, dropping the port and the auth flow with
  # it. Relative redirects let the browser keep whatever host:port it
  # originally hit.
  absolute_redirect off;

  # Astro static output puts each route at either `/path/` (index.html
  # inside a dir) or `/path.html`. try_files walks those patterns so
  # `/auth/done` resolves to `/auth/done/index.html` or `/auth/done.html`
  # depending on how astro emitted it.
  location / {
    try_files $uri $uri/ $uri.html =404;
  }

  # Astro's build drops hashed assets under /assets/. Immutable cache
  # header is safe because the hash changes on every content edit.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
