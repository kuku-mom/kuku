$schema: "https://moonrepo.dev/schemas/project.json"

language: "rust"
layer: "library"

# Cargo already resolves this via `kuku-contract = { path = ... }` in
# Cargo.toml, but declaring it here lets moon's task graph track the
# edge cross-language (proto edit in packages/contract → rebuild here).
dependsOn:
  - "kuku-contract"

# Scoped to this crate via `cargo … -p kuku-ai` so moon's per-project cache
# invalidates on a per-crate basis. Cargo still shares the workspace's
# target/ dir so cross-crate compile artifacts are reused transparently.
tasks:
  format:
    command: "cargo fmt -p kuku-ai"

  format-check:
    command: "cargo fmt -p kuku-ai -- --check"
    inputs:
      - "src/**/*.rs"
      - "build.rs"
      - "Cargo.toml"

  # clippy has no safe auto-fix convention, so `lint` and `lint-check`
  # run the same command. Both names exist so the standard package-level
  # commands (format / lint / check / test) stay symmetric across the
  # workspace.
  lint:
    command: "cargo clippy -p kuku-ai --all-targets -- -D warnings"
    inputs:
      - "src/**/*.rs"
      - "build.rs"
      - "Cargo.toml"
      - "/Cargo.toml"
      - "/Cargo.lock"

  lint-check:
    command: "cargo clippy -p kuku-ai --all-targets -- -D warnings"
    inputs:
      - "src/**/*.rs"
      - "build.rs"
      - "Cargo.toml"
      - "/Cargo.toml"
      - "/Cargo.lock"

  test:
    command: "cargo test -p kuku-ai"
    inputs:
      - "src/**/*.rs"
      - "build.rs"
      - "Cargo.toml"
      - "/Cargo.toml"
      - "/Cargo.lock"

  clean:
    command: "cargo clean -p kuku-ai"
    options:
      cache: false
      runInCI: false

  check:
    deps:
      - "format-check"
      - "lint-check"
